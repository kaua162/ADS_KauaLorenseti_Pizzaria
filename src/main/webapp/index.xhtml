<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Login - Pizzaria</title>
    </h:head>

    <h:body>
        <h:form>
            <p:panel header="🍕 Login - Sistema Pizzaria" style="width:400px; margin:100px auto">
                <p:growl id="msgs" showDetail="true"/>
                <h:panelGrid columns="2" style="margin:10px">
                    <h:outputLabel value="Usuário:"/>
                    <p:inputText value="#{loginController.usuario}"/>
                    <h:outputLabel value="Senha:"/>
                    <p:password value="#{loginController.senha}"/>
                </h:panelGrid>
                <p:commandButton value="Entrar" action="#{loginController.login}"
                                 update="msgs" style="margin:10px"/>
            </p:panel>
        </h:form>
    </h:body>
</html>
