<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pm="http://primefaces.org/manhattan">

    <div class="layout-sidebar">
        <div class="layout-sidebar-logo">
            <a href="#" id="layout-sidebar-anchor" class="layout-sidebar-anchor" title="Toggle Menu">
                <i class="pi"/>
            </a>
        </div>

        <div class="layout-menu-container">
            <h:form id="menuform">
                <pm:menu widgetVar="ManhattanMenuWidget">
                    <p:menuitem id="mnuCliente"
                                value="Clientes"
                                icon="pi pi-fw pi-users"
                                outcome="/admin/cliente.xhtml"/>
                    <p:menuitem id="mnuPizza"
                                value="Pizzas"
                                icon="pi pi-fw pi-circle-fill"
                                outcome="/admin/pizza.xhtml"/>
                    <p:menuitem id="mnuPedido"
                                value="Pedidos"
                                icon="pi pi-fw pi-shopping-cart"
                                outcome="/admin/pedido.xhtml"/>
                    <p:menuitem id="mnuEntrega"
                                value="Entregas"
                                icon="pi pi-fw pi-car"
                                outcome="/admin/entrega.xhtml"/>
                    <p:menuitem id="mnuSair"
                                value="Sair"
                                action="#{loginController.logout()}"
                                icon="pi pi-fw pi-sign-out"/>
                </pm:menu>
            </h:form>
        </div>
    </div>

</ui:composition>
